name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} / Django ${{ matrix.django-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.9"
            django-version: "4.2.*"
          - python-version: "3.10"
            django-version: "4.2.*"
          - python-version: "3.11"
            django-version: "4.2.*"
          - python-version: "3.12"
            django-version: "4.2.*"
          - python-version: "3.10"
            django-version: "5.2.*"
          - python-version: "3.11"
            django-version: "5.2.*"
          - python-version: "3.12"
            django-version: "5.2.*"
          - python-version: "3.13"
            django-version: "5.2.*"
          - python-version: "3.14"
            django-version: "5.2.*"

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          uv sync --dev
          uv pip install "django==${{ matrix.django-version }}"

      - name: Lint
        run: uv run ruff check .

      - name: Format
        run: uv run ruff format --check .

      - name: Test
        run: uv run pytest -q --cov --cov-report=term-missing

      - name: Build
        run: uv build
